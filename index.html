<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta
      name="description"
      content="A welcoming public map and field journal for sightings of Jimothy the raccoon."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Jimothy the Raccoon Tracker</title>
    <script type="module" crossorigin src="/assets/index-Dtw-Vwsk.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Cg66F2qH.css">
    <!-- script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAlxVpnD3O24HnHep4J4gwWZCHqKG7uewk&libraries=places"></script -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAlxVpnD3O24HnHep4J4gwWZCHqKG7uewk&libraries=places&callback=initMap" async defer></script>
  </head>
  <body class="font-sans bg-[#f8f8f7] text-[#34322d]">

  <!-- Header -->
  <header class="p-6 text-center">
    <h1 class="text-4xl font-serif mb-2">Jimothy the Raccoon Tracker</h1>
    <p class="text-sm text-[#858481]">A community field journal for respectful neighbors.</p>
  </header>

  <!-- Explore Map -->
  <section class="max-w-6xl mx-auto p-6">
    <h2 class="text-2xl font-semibold mb-4">Explore map</h2>

    <div id="map" class="w-full h-[500px] rounded-lg shadow"></div>

    <p class="mt-2 text-sm text-[#858481]">Click the map to place a location.</p>
  </section>

  <!-- Sighting Form -->
  <section class="max-w-6xl mx-auto p-6">
    <h2 class="text-2xl font-semibold mb-4">Report a sighting</h2>

    <form id="sightingForm" class="space-y-4">

      <!-- Location -->
      <div>
        <label class="block text-sm font-medium mb-1">Where did you see him?</label>
        <input id="locationInput" type="text" class="w-full p-3 rounded border" placeholder="Park name, street address, or 40.7128, -74.0060">
      </div>

      <!-- Time -->
      <div>
        <label class="block text-sm font-medium mb-1">When did you see him?</label>
        <input id="timeInput" type="datetime-local" class="w-full p-3 rounded border">
      </div>

      <!-- Note -->
      <div>
        <label class="block text-sm font-medium mb-1">A little more detail (optional)</label>
        <textarea id="noteInput" class="w-full p-3 rounded border" rows="3" placeholder="What was Jimothy up to?"></textarea>
      </div>

      <!-- Photo -->
      <div>
        <label class="block text-sm font-medium mb-1">A photo of Jimothy (optional)</label>
        <input id="photoInput" type="file" accept="image/jpeg,image/png,image/webp" class="w-full">
      </div>

      <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Share sighting</button>
    </form>
  </section>

  <!-- Field Journal -->
  <section class="max-w-6xl mx-auto p-6">
    <h2 class="text-2xl font-semibold mb-4">Latest sightings</h2>

    <div id="journalError" class="hidden p-4 bg-red-100 rounded">
      The field journal needs a moment. Public sightings could not be loaded just now.
      <button id="reloadJournal" class="underline ml-2">Reload sightings</button>
    </div>

    <ul id="journalList" class="space-y-4"></ul>
  </section>

  <script type="module" src="/assets/index.js"></script>
  </body>
</html>
